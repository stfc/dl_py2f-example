# This starter workflow is for a CMake project running on a single platform. There is a different starter workflow if you need cross-platform coverage.
# See: https://github.com/actions/starter-workflows/blob/main/ci/cmake-multi-platform.yml
name: GNU

on:
  push:
    branches: 
      - main
      - 22-update-for-dl_py2f
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
      inputs:
      logLevel:
        description: 'Log level'
        required: true
        default: 'warning'
        type: choice
        options:
        - info
        - warning
        - debug
      tags:
        description: 'Test scenario tags'
        required: false
        type: boolean
      environment:
        description: 'Environment to run tests against'
        type: environment
        required: true

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  build:
    # The CMake configure and build commands are platform agnostic and should work equally well on Windows or Mac.
    # You can convert this to a matrix build if you need cross-platform coverage.
    # See: https://docs.github.com/en/free-pro-team@latest/actions/learn-github-actions/managing-complex-workflows#using-a-build-matrix
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: NumPy
      run: python3 -m pip install numpy
    
    - name: mkdir
      working-directory: ${{github.workspace}}/example
      run: mkdir build

    - name: Clone DL_PY2F
      working-directory: ${{github.workspace}}/example
      run: git clone https://github.com/stfc/dl_py2f.git dl_py2f

    - name: Configure CMake
      working-directory: ${{github.workspace}}/example/build
      run: cmake -DFROM_SOURCE:BOOL=TRUE ${{github.workspace}}/example

    - name: Build
      working-directory: ${{github.workspace}}/example/build
      run: make

    - name: Diagnostic
      working-directory: ${{github.workspace}}
      run: |
        python3 -c "
        import numpy as np; print(f'numpy {np.__version__}')
        import sys; sys.path.insert(0,'.'); from example.example import Example
        e = Example(); e.size = 2
        print(f'itemsize: {e._master.dtype.itemsize}')
        for name in e._master.dtype.names:
            off = e._master.dtype.fields[name][1]
            print(f'  {name:12s}: offset={off}')
        import ctypes; print(f'sizeof(c_long)={ctypes.sizeof(ctypes.c_long)}')
        "
      env:
        PYTHONPATH: ${{github.workspace}}

    - name: Test
      working-directory: ${{github.workspace}}
      run: |
        set -o pipefail
        python3 user_script.py
      env:
        PYTHONPATH: ${{github.workspace}}

